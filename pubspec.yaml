name: concha
description: "Concha — hear it again. sing it better."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 0.0.18

environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter

  # I18n
  flutter_localizations:
    sdk: flutter
  intl: any
  locale_names: ^1.1.1

  # Audio
  audio_metadata_reader: ^1.4.2
  flutter_soloud: ^3.5.0

  # UI
  animations: ^2.1.1
  file_selector: ^1.1.0
  flutter_lyric: ^3.0.2
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  skeletonizer: ^2.1.3
  flutter_staggered_grid_view: ^0.7.0
  fireworks:
    git:
      url: https://github.com/joodo/fireworks
      path: fireworks

  # Riverpod magic
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  hooks_riverpod: ^3.2.1
  flutter_hooks: ^0.21.3+1
  riverpod_annotation: ^4.0.2
  riverpod_sqflite: ^0.4.2
  flutter_riverpod: ^3.3.1
  sqflite: ^2.4.2

  # Utils
  styled_widget: ^0.4.1
  llm_dart: ^0.10.7
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  shared_preferences: ^2.5.4
  dio: ^5.9.2
  async: ^2.13.0
  collection: ^1.19.1
  crypto: ^3.0.7
  convert: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.3
  riverpod_generator: ^4.0.3
  json_serializable: ^6.11.1
  freezed: ^3.2.5
  flutter_launcher_icons: ^0.14.4
  icon_font_generator: ^4.1.0

dependency_overrides:
  test_api: 0.7.7

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/share.png
  fonts:
    - family: icon_font_generator Icons
      fonts:
        - asset: assets/icon_font.otf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon.png
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: assets/icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icon.png

flutter_intl:
  enabled: true
